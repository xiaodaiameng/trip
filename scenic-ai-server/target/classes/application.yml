server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: scenic-ai-server
  datasource:
    url: jdbc:h2:file:./data/scenic-ai-mvp;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false

app:
  admin:
    username: admin
    password: admin123
    display-name: 灵山运营管理员
